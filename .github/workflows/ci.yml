name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff format
        run: python -m ruff format --check .

      - name: Ruff check
        run: python -m ruff check .

      - name: Typecheck
        run: python -m mypy .

      - name: Test
        run: python -m pytest

  scripts-and-config:
    name: Scripts and config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Shell syntax
        run: find scripts -name "*.sh" -print0 | xargs -0 -r bash -n

      - name: Docs, JSON, and YAML sanity
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          json.loads(Path("app/frontend/package.json").read_text())
          PY
          python -m pip install --upgrade pip pyyaml
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in [
              ".github/workflows/ci.yml",
              ".github/dependabot.yml",
              ".github/ISSUE_TEMPLATE/feature.md",
              ".github/ISSUE_TEMPLATE/bug.md",
              ".github/ISSUE_TEMPLATE/docs.md",
              ".github/ISSUE_TEMPLATE/cm1-scenario.md",
              ".github/ISSUE_TEMPLATE/visualization.md",
          ]:
              text = Path(path).read_text()
              if path.endswith(".md") and text.startswith("---"):
                  yaml.safe_load(text.split("---", 2)[1])
              else:
                  yaml.safe_load(text)
          PY
          python - <<'PY'
          import os
          from pathlib import Path

          required_phrase = "Cloud Chamber"
          old_product_name = "CM1 " + "Studio"
          pruned_dirs = {".git", "node_modules", ".venv", "dist", "coverage", ".mypy_cache", ".pytest_cache", ".ruff_cache"}

          for root, dirs, files in os.walk("."):
              dirs[:] = [directory for directory in dirs if directory not in pruned_dirs]
              for filename in files:
                  if not filename.endswith(".md"):
                      continue
                  path = Path(root, filename)
                  text = path.read_text()
                  if not text.strip():
                      raise SystemExit(f"{path} is empty")
                  if not text.lstrip().startswith(("#", "---")):
                      raise SystemExit(f"{path} should start with a heading or YAML front matter")
                  if old_product_name in text:
                      raise SystemExit(f"{path} still contains old product naming")

          for path in [Path("README.md"), Path("AGENTS.md")]:
              if required_phrase not in path.read_text():
                  raise SystemExit(f"{path} must mention {required_phrase}")
          PY
