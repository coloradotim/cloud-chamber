# Example matrix for docs/research/surface-forced-sounding-verification-protocol.md
#
# This file is a template only. It should be copied into a runtime/campaigns or
# local working area before a real campaign runner packages or queues runs.
# Do not commit generated packages, NetCDF output, logs, screenshots, traces,
# videos, local connection settings, local settings, or machine-private paths.

schema_version: surface_forced_campaign_matrix_v1

campaign:
  campaign_id: surface_forced_smoke_001
  title: Surface-forced sounding smoke and shallow-depth diagnosis
  objective: >-
    Verify whether numeric uniform lower-boundary heat/moisture forcing is wired
    through package generation, CM1 output, ingest, and result summaries; then
    test whether an easy deep-candidate sounding can deepen under uniform forcing.
  protocol: docs/research/surface-forced-sounding-verification-protocol.md
  commit_report_path: docs/research/surface-forced-campaigns/surface_forced_smoke_001.md
  artifact_policy:
    commit_reports_only: true
    do_not_commit:
      - generated_cm1_packages
      - netcdf_output
      - runtime_folders
      - stdout_stderr_logs
      - screenshots
      - traces
      - videos
      - local_connection_settings
      - local_settings
      - machine_private_absolute_paths

# Execution is safe by default. A runner should plan unless the operator passes
# an explicit mode such as --package, --queue, --ingest, or --report.
execution:
  default_mode: plan
  queue_requires_explicit_mode: true
  queue_target: local
  runtime_home_env: CLOUD_CHAMBER_RUNTIME_HOME
  cm1_install_env: CM1_HOME
  max_concurrent_runs: 1
  resume_existing: true
  phase_gates:
    phase1_selected_and_cm1_facing_forcing_metadata_missing:
      result: fail
      automatic_continuation: blocked
    phase1_hfx_or_lhfx_missing_when_requested:
      result: inconclusive_missing_evidence
      automatic_continuation: blocked
    phase1_low_level_response_diagnostic_missing:
      result: inconclusive_missing_evidence
      automatic_continuation: blocked
    phase1_partial_verification:
      result: partial_verification
      automatic_continuation: blocked_without_operator_override
    phase1_verified:
      result: forcing_path_verified_for_campaign
      automatic_continuation: allowed
  lifecycle_status_values:
    - planned
    - packaged
    - queued
    - running
    - completed_not_ingested
    - ingested
    - package_failed
    - run_failed
    - ingest_failed
    - skipped
    - blocked

# Source union: each source must be exactly one of saved_candidate,
# cached_recommendation, or uploaded_or_local_igra. Committed examples should use
# portable placeholders; runtime-local state may store actual local paths.
selection_sets:
  - selection_id: control_sounding
    role: forcing_path_smoke_check
    source:
      type: saved_candidate
      saved_candidate_id: replace-with-saved-candidate-id
    selection_notes: >-
      Use a simple/control sounding with usable winds and enough low-level data.
      This should not be a marginal data-quality case.

  - selection_id: easy_deep_candidate
    role: easy_deep_response_check
    source:
      type: cached_recommendation
      candidate_id: replace-with-cached-candidate-id
      station_id: optional-station-id-for-disambiguation
      valid_time_utc: optional-valid-time-for-disambiguation
    selection_criteria:
      preferred_story: severe_thunderstorm_environment
      desired_properties:
        - high_cape_or_instability_proxy
        - weak_cap_or_low_cin_if_available
        - low_lfc_or_low_lcl_if_available
        - deep_moisture
        - complete_wind_profile
        - good_low_level_coverage

  - selection_id: weak_control
    role: cross_sounding_discrimination_check
    source:
      type: cached_recommendation
      candidate_id: replace-with-weak-or-marginal-candidate-id
    selection_notes: >-
      Use a weak or marginal sounding to test whether the same forcing produces
      a clearly different response than the easy deep candidate.

run_defaults:
  duration: short_6h
  horizontal_cell_count: cells_128
  domain_size: wide_12km
  output_cadence: standard_15min
  surface_heat_flux_k_m_s: 8.0e-3
  surface_moisture_flux_g_g_m_s: 5.2e-5
  queue_target: local
  tags:
    - surface-forced-verification
  notes: Surface-forced verification campaign run.

# Override precedence for each resolved run:
# run_defaults -> referenced forcing_set -> run-specific overrides.
forcing_sets:
  - forcing_id: default_flux
    surface_heat_flux_k_m_s: 8.0e-3
    surface_heat_flux_units: K m/s
    surface_moisture_flux_g_g_m_s: 5.2e-5
    surface_moisture_flux_units: g/g m/s
    purpose: baseline/default configured forcing

  - forcing_id: high_sensible_only
    surface_heat_flux_k_m_s: 4.0e-2
    surface_heat_flux_units: K m/s
    surface_moisture_flux_g_g_m_s: 5.2e-5
    surface_moisture_flux_units: g/g m/s
    purpose: isolate heat-flux sensitivity

  - forcing_id: high_moisture_only
    surface_heat_flux_k_m_s: 8.0e-3
    surface_heat_flux_units: K m/s
    surface_moisture_flux_g_g_m_s: 1.0e-4
    surface_moisture_flux_units: g/g m/s
    purpose: isolate moisture-flux sensitivity

  - forcing_id: high_heat_high_moisture
    surface_heat_flux_k_m_s: 4.0e-2
    surface_heat_flux_units: K m/s
    surface_moisture_flux_g_g_m_s: 1.0e-4
    surface_moisture_flux_units: g/g m/s
    purpose: combined forcing sensitivity

runs:
  - matrix_id: phase1_control_default_flux
    phase: forcing_path_smoke_check
    selection_id: control_sounding
    forcing_id: default_flux
    duration: short_6h
    domain_size: wide_12km
    comparison_role: phase1_control

  - matrix_id: phase1_control_high_sensible
    phase: forcing_path_smoke_check
    selection_id: control_sounding
    forcing_id: high_sensible_only
    duration: short_6h
    domain_size: wide_12km
    comparison:
      type: heat_flux_sensitivity
      control_matrix_id: phase1_control_default_flux
    comparison_role: heat_flux_sensitivity

  - matrix_id: phase1_control_high_moisture
    phase: forcing_path_smoke_check
    selection_id: control_sounding
    forcing_id: high_moisture_only
    duration: short_6h
    domain_size: wide_12km
    comparison:
      type: moisture_flux_sensitivity
      control_matrix_id: phase1_control_default_flux
    comparison_role: moisture_flux_sensitivity

  - matrix_id: phase1_control_high_both
    phase: forcing_path_smoke_check
    selection_id: control_sounding
    forcing_id: high_heat_high_moisture
    duration: short_6h
    domain_size: wide_12km
    comparison:
      type: combined_flux_sensitivity
      control_matrix_id: phase1_control_default_flux
    comparison_role: combined_flux_sensitivity

  - matrix_id: phase2_easy_deep_default_12km_6h
    phase: easy_sounding_response_check
    selection_id: easy_deep_candidate
    forcing_id: default_flux
    duration: short_6h
    domain_size: wide_12km
    comparison_role: phase2_default_control

  - matrix_id: phase2_easy_deep_strong_12km_6h
    phase: easy_sounding_response_check
    selection_id: easy_deep_candidate
    forcing_id: high_heat_high_moisture
    duration: short_6h
    domain_size: wide_12km
    comparison:
      type: forcing_sensitivity_same_duration
      control_matrix_id: phase2_easy_deep_default_12km_6h
    comparison_role: forcing_sensitivity_same_duration

  - matrix_id: phase2_easy_deep_strong_12km_12h
    phase: easy_sounding_response_check
    selection_id: easy_deep_candidate
    forcing_id: high_heat_high_moisture
    duration: standard_12h
    domain_size: wide_12km
    comparison:
      type: duration_sensitivity_same_forcing
      control_matrix_id: phase2_easy_deep_strong_12km_6h
    comparison_role: duration_sensitivity_same_forcing

  - matrix_id: phase2_easy_deep_strong_60km_12h
    phase: easy_sounding_response_check
    selection_id: easy_deep_candidate
    forcing_id: high_heat_high_moisture
    duration: standard_12h
    domain_size: regional_60km
    comparison:
      type: domain_grid_bundle_sensitivity
      control_matrix_id: phase2_easy_deep_strong_12km_12h
    comparison_role: domain_grid_bundle_sensitivity

  # Optional expensive run. The runner should not queue optional runs unless the
  # operator explicitly includes optional items.
  - matrix_id: phase2_easy_deep_strong_120km_12h_optional
    phase: easy_sounding_response_check
    optional: true
    selection_id: easy_deep_candidate
    forcing_id: high_heat_high_moisture
    duration: standard_12h
    domain_size: regional_120km
    comparison:
      type: expensive_regional_bundle_check
      control_matrix_id: phase2_easy_deep_strong_60km_12h
    comparison_role: expensive_regional_bundle_check

  - matrix_id: phase3_weak_control_strong_60km_12h
    phase: cross_sounding_discrimination_check
    selection_id: weak_control
    forcing_id: high_heat_high_moisture
    duration: standard_12h
    domain_size: regional_60km
    comparison:
      type: cross_sounding_discrimination
      control_matrix_id: phase2_easy_deep_strong_60km_12h
    comparison_role: cross_sounding_discrimination

comparison_types:
  heat_flux_sensitivity:
