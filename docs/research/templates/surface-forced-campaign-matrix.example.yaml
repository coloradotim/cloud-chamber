    - matrix_id
    - stable_resume_identity
    - run_id
    - result_id
    - station_id
    - station_name
    - valid_time_utc
    - candidate_story
    - candidate_score
    - selected_surface_heat_flux_k_m_s
    - selected_surface_heat_flux_units
    - selected_surface_moisture_flux_g_g_m_s
    - selected_surface_moisture_flux_units
    - cm1_cnst_shflx
    - cm1_cnst_shflx_units
    - cm1_cnst_lhflx
    - cm1_cnst_lhflx_units
    - duration
    - domain_size
    - horizontal_cell_count
    - nx
    - ny
    - nz
    - dx_m
    - dy_m
    - dz_m
    - model_top_m
    - output_cadence
    - queue_target
    - package_status
    - run_status
    - ingest_status
    - required_output_fields
    - missing_output_fields
    - warnings
    - caveats
  evidence:
